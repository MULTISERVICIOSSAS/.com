        function shuffledOptions(options) {
            const shuffled = options.map((text, originalIndex) => ({ text, originalIndex }));
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function renderExamReview() {
            return courseData.finalExam.map((question, index) => {
                const selectedIndex = state.answers[index];
                const isCorrect = selectedIndex === question.a;
                const selectedAnswer = question.options[selectedIndex] || 'Sin respuesta';
                const statusClass = isCorrect
                    ? 'border-green-500 bg-green-50'
                    : 'border-red-500 bg-red-50';
                const status = isCorrect
                    ? '<span class="text-green-700 font-bold"><i class="fas fa-check-circle mr-2"></i>Correcta</span>'
                    : '<span class="text-red-700 font-bold"><i class="fas fa-times-circle mr-2"></i>Incorrecta, revisa la corrección</span>';

                return `

                        <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-2 mb-3">

                            <div class="flex-shrink-0">${status}</div>

                        <p class="text-gray-700"><strong>Tu respuesta:</strong> ${selectedAnswer}</p>
                        ${isCorrect ? '' : `<p class="text-green-800 mt-2"><strong>Respuesta correcta:</strong> ${question.options[question.a]}</p>`}

                `;
            }).join('');

                    </div>
                    <div class="flex justify-center mb-10">
                        <button onclick="sendToWhatsApp()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-4 px-8 rounded-lg shadow-lg transition flex items-center justify-center text-lg max-w-xl">
                            <i class="fab fa-whatsapp mr-3 text-2xl"></i> Enviar tus resultados a RRHH para pagar y recibir tu certificado
                        </button>
                    </div>
                    <div class="bg-white p-6 md:p-8 rounded-xl shadow-lg mb-10">
                        <div class="text-left mb-6">
                            <h3 class="text-2xl font-bold text-gray-900">Revisión completa del examen</h3>
                            <p class="text-gray-600 mt-1">Consulta tus respuestas correctas y las preguntas corregidas.</p>
                        </div>
                        <div class="space-y-4">${renderExamReview()}</div>
                    </div>
                `;
            } else {
                div.innerHTML = `
                    <div class="bg-white p-10 rounded-xl shadow-lg max-w-2xl mx-auto text-center border-t-4 border-red-500">
                        <div class="mb-6 inline-block p-6 rounded-full bg-red-50">
                            <i class="fas fa-times-circle text-6xl text-red-500"></i>
                        </div>
                        <h2 class="text-3xl font-bold text-gray-800 mb-4">No has aprobado</h2>
                        <div class="bg-red-50 p-6 rounded-lg mb-8">
                            <p class="text-gray-800 mb-2 text-xl font-semibold">Tu resultado: <span class="text-red-600">${percentage}%</span></p>
                            <p class="text-gray-600">Necesitas un mínimo de 80% para aprobar el examen.</p>
                            <p class="text-sm text-gray-500 mt-2">Respuestas correctas: ${state.score} / ${courseData.finalExam.length}</p>
                        </div>
                        
                        <button onclick="retryExam()" class="bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-4 px-10 rounded-full shadow-lg transition transform hover:scale-105 flex items-center mx-auto text-lg">
                            <i class="fas fa-undo mr-3"></i> Intentar Examen Nuevamente
                        </button>
                        
                        <div class="mt-8 pt-6 border-t border-gray-100">
                            <p class="text-gray-500 mb-4">¿Sientes que necesitas repasar los videos?</p>
                            <button onclick="restartCourse()" class="text-blue-600 hover:text-blue-800 font-semibold hover:underline">
                                Volver al inicio del curso
                            </button>
                        </div>
                    </div>
                    <div class="bg-white p-6 md:p-8 rounded-xl shadow-lg mt-8 mb-10">
                        <div class="text-left mb-6">
                            <h3 class="text-2xl font-bold text-gray-900">Revisión completa del examen</h3>
                            <p class="text-gray-600 mt-1">Repasa tus respuestas y estudia las correcciones antes de intentarlo nuevamente.</p>
                        </div>
                        <div class="space-y-4">${renderExamReview()}</div>
                    </div>
                `;
            }
            app.appendChild(div);
        }

        // Logic Functions
        function collectUserData() {
            const nameInput = document.getElementById('username');
            const documentInput = document.getElementById('userdocument');
            const emailInput = document.getElementById('useremail');
            const phoneInput = document.getElementById('userphone');
            if (!nameInput.value.trim()) {
                alert('Por favor ingresa tu nombre completo para continuar.');
                nameInput.focus();
                return false;
            }
            if (!documentInput.value.trim()) {
                alert('Por favor ingresa tu documento para registrar el resultado.');
                documentInput.focus();
                return false;
            }
            if (!phoneInput.value.trim()) {
                alert('Por favor ingresa tu teléfono o WhatsApp.');
                phoneInput.focus();
                return false;
            }
            state.userName = nameInput.value.trim();
            state.userDocument = documentInput.value.trim();
            state.userEmail = emailInput.value.trim();
            state.userPhone = phoneInput.value.trim();
            return true;
        }

        function saveCourseResult() {
            const percentage = Math.round((state.score / courseData.finalExam.length) * 100);
            const passed = state.score >= Math.ceil(courseData.finalExam.length * 0.80);
            const record = {
                nombre: state.userName,
                documento: state.userDocument,
                correo: state.userEmail,
                telefono: state.userPhone,
                curso: 'Manipulación de Alimentos',
                puntaje: state.score,
                total: courseData.finalExam.length,
                porcentaje: percentage,
                estado: passed ? 'Aprobado' : 'No aprobado',
                fecha: new Date().toISOString(),
                version_examen: 1,
                respuestas: state.answers.slice()
            };
            const current = JSON.parse(localStorage.getItem('msCourseResults') || '[]');
            current.unshift(record);
            localStorage.setItem('msCourseResults', JSON.stringify(current.slice(0, 100)));
            publishCourseResultToApi(record);
        }

        function publishCourseResultToApi(record) {
            const cfg = window.MULTISERVICIOS_CONFIG || {};
            const base = String(cfg.certificadosAdminApiUrl || cfg.certificadosApiUrl || '').replace(/\/$/, '');
            if (!base) return;
            fetch(base + '/resultados', {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(record)
            }).catch(function (error) {
                console.warn('No se pudo enviar el resultado del curso a la API', error);
            });
        }

        function startCourse() {
            if (!collectUserData()) return;
            state.screen = 'module';
            render();
        }

        function goToQuiz() {
            state.screen = 'module-quiz';
            render();
        }

        function checkModuleAnswer(selectedIndex) {
            const module = courseData.modules[state.currentModuleIndex];
            const feedback = document.getElementById('feedback');
            feedback.classList.remove('hidden');
            
            if (selectedIndex === module.quiz.correct) {
                feedback.innerHTML = `
                    <div class="bg-green-100 border-l-4 border-green-500 text-green-800 p-4 rounded shadow-sm mb-4" role="alert">
                        <p class="font-bold text-lg"><i class="fas fa-check-circle mr-2"></i>¡Correcto!</p>
                        <p>Has asimilado bien el concepto.</p>
                    </div>
                    <button onclick="nextModule()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg shadow transition w-full flex justify-center items-center text-lg">
                        <span>Siguiente Módulo</span>
                        <i class="fas fa-arrow-right ml-3"></i>
                    </button>
                `;
            } else {
                feedback.innerHTML = `
                    <div class="bg-red-100 border-l-4 border-red-500 text-red-800 p-4 rounded shadow-sm" role="alert">
                        <p class="font-bold text-lg"><i class="fas fa-exclamation-circle mr-2"></i>Incorrecto</p>
                        <p>Intenta recordar lo visto en el video y selecciona otra opción.</p>
                    </div>
                `;
            }
        }

        function nextModule() {
            if (state.currentModuleIndex < courseData.modules.length - 1) {
                state.currentModuleIndex++;
                state.screen = 'module';
            } else {
                state.screen = 'exam-intro';
            }
            render();
        }

        function startExam() {
            state.screen = 'exam';
            render();
        }

        function submitExam(e) {
            e.preventDefault();
            const form = e.target;
            const formData = new FormData(form);
            let score = 0;
            let answeredCount = 0;
            const answers = courseData.finalExam.map((question, qIdx) => {
                const value = formData.get(`q${qIdx}`);
                if (value === null) return null;
                answeredCount += 1;
                const answer = Number(value);
                if (question.a === answer) {
                    score++;
                }
                return answer;
            });
            if (answeredCount < courseData.finalExam.length) {
                alert(`Has respondido ${answeredCount} de ${courseData.finalExam.length} preguntas. Por favor responde todas antes de enviar.`);
                return;
            }
            if (confirm("¿Estás seguro de que deseas enviar tus respuestas para calificación?")) {
                state.score = score;
                state.answers = answers;
                saveCourseResult();
                state.screen = 'result';
                render();
            }
        }

        function retryExam() {
            state.score = 0;
            state.answers = [];
            state.screen = 'exam';
            render();
        }

        function skipToExam() {
            if (!collectUserData()) return;
            if(confirm("¿Estás seguro? Irás directamente a la evaluación final sin ver los videos de repaso.")) {
                state.screen = 'exam-intro';
                render();
            }
        }

        function sendToWhatsApp() {
            const cfg = window.MULTISERVICIOS_CONFIG || {};
            const rawPhone = String(cfg.whatsapp || "3222166831").replace(/\D/g, "");
            const phoneNumber = rawPhone.startsWith("57") ? rawPhone : `57${rawPhone}`;
            const incorrectQuestions = state.answers
                .map((answer, index) => answer === courseData.finalExam[index].a ? null : index + 1)
                .filter(Boolean);
            const review = incorrectQuestions.length
                ? `Preguntas corregidas: ${incorrectQuestions.join(', ')}`
                : 'Todas las respuestas fueron correctas';
            const message = `Hola, soy *${state.userName}*. Aprobé el examen del Curso de Manipulación de Alimentos Multiservicios y deseo realizar el pago para recibir mi certificado oficial.\n\nDocumento: ${state.userDocument}\nCorreo: ${state.userEmail || 'No registrado'}\nTeléfono: ${state.userPhone}\nResultado: APROBADO\nNota: ${state.score}/${courseData.finalExam.length}\n${review}\nFecha: ${new Date().toLocaleDateString()}\n\nPor favor, RRHH, verifique mi resultado y envíeme las instrucciones de pago.`;
            const url = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`;
            window.open(url, '_blank', 'noopener');
        }

        function restartCourse() {
            if(confirm("¿Estás seguro de que quieres reiniciar todo el curso? Se perderá tu progreso actual.")){
                state.currentModuleIndex = 0;
                state.score = 0;
                state.answers = [];
                state.screen = 'intro';
                render();
            }
        }

        // Init
        render();
    </script>
</body>
</html>
